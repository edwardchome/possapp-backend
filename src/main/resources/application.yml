server:
  port: 8080 # Change to 8040 for production
  servlet:
    context-path: /

spring:
  application:
    name: possapp-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/possapp_db
    username: ${DB_USER:postgres}
    password: 12345Abc$
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Note: Do NOT set schema here - multi-tenancy handles schema switching
  
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        # NOTE: Do NOT set default_schema - multi-tenancy handles schema switching
        multiTenancy: SCHEMA
        connection.handling_mode: DELAYED_ACQUISITION_AND_HOLD
    open-in-view: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public
    create-schemas: true

